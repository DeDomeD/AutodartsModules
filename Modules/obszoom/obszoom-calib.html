<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Konfigurator — OBS Zoom</title>
  <link rel="stylesheet" href="../../Main/popup.css" />
  <link rel="stylesheet" href="obszoom-calib-board.css" />
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #06080c;
      color: var(--text, #e9eef7);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    }
    #calibRoot {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
      box-sizing: border-box;
    }
    #calibStageRow {
      flex: 1;
      min-height: 0;
      min-width: 0;
      position: relative;
    }
    .calib-wizardBanner {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      z-index: 25;
      pointer-events: none;
      box-sizing: border-box;
      padding: 12px 14px;
      text-align: center;
      font-size: clamp(1.05rem, 2.4vw, 1.45rem);
      font-weight: 700;
      line-height: 1.35;
      letter-spacing: 0.02em;
      color: #eaf8ff;
      background: linear-gradient(180deg, rgba(25, 199, 255, 0.32), rgba(25, 199, 255, 0.12));
      border: 1px solid rgba(25, 199, 255, 0.45);
      border-radius: 10px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.55);
      text-shadow: 0 1px 14px rgba(0, 0, 0, 0.9);
    }
    .calib-wizardBanner[hidden] {
      display: none !important;
    }
    .calib-zoomHud {
      position: absolute;
      bottom: 14px;
      right: 14px;
      z-index: 40;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 220px;
      max-width: min(92vw, 320px);
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(8, 12, 20, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 10px 32px rgba(0, 0, 0, 0.5);
      pointer-events: auto;
      backdrop-filter: blur(8px);
    }
    .calib-catNav {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
    }
    .calib-catNav .btnMini {
      flex: 0 0 auto;
      white-space: nowrap;
    }
    .calib-catLabel {
      flex: 1;
      text-align: center;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.04em;
      opacity: 0.95;
    }
    .calib-zoomHudLabel {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
      opacity: 0.92;
    }
    #calibObsZoomSlider {
      width: 100%;
      accent-color: var(--accent, #19c7ff);
    }
    .calib-zoomHudReadout {
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      opacity: 0.9;
      text-align: right;
    }
    .calib-applyHud {
      position: absolute;
      bottom: 14px;
      left: 14px;
      z-index: 40;
      pointer-events: auto;
    }
    .calib-applyHud .btnMini {
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
    }
    #calibFallbackWrap.calib-fallbackWrap {
      position: absolute;
      left: 10px;
      bottom: 56px;
      right: auto;
      max-width: min(96%, 360px);
      z-index: 35;
      margin: 0;
    }
    #calibStatus.calib-statusBar {
      flex-shrink: 0;
      margin: 0;
      padding: 8px 12px 10px;
      font-size: 11px;
      line-height: 1.35;
      color: var(--muted, rgba(233, 238, 247, 0.68));
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      min-height: 2.5em;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div id="calibRoot">
    <div class="calib-stage calib-stageFill" id="calibStageRow">
      <div id="calibWizardBanner" class="calib-wizardBanner" hidden aria-live="polite"></div>
      <div class="calib-imgShell" id="calibImgShell">
        <div class="calib-zoomInner" id="calibZoomInner">
          <img class="calib-img" id="calibImg" alt="Vorschau" />
          <svg class="calib-layoutSvg" id="calibLayoutSvg" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"></svg>
        </div>
        <div class="calib-reticle" id="calibReticle"></div>
        <div class="calib-toolbar">
          <button type="button" class="btnMini" id="btnCalibShot">Aktualisieren</button>
          <button type="button" class="btnMini" id="calibFs">Vollbild</button>
        </div>
        <div class="calib-applyHud" id="calibApplyHud">
          <button type="button" class="btn primary btnMini" id="btnCalibApplyFilters">Filter anwenden</button>
        </div>
        <div class="calib-zoomHud" id="calibZoomHud" aria-label="Kategorie und Zoom">
          <div class="calib-catNav" role="group" aria-label="Kategorie wechseln">
            <button type="button" class="btnMini" id="btnCalibCatPrev">← Zurück</button>
            <span class="calib-catLabel" id="calibCatLabel">Triple</span>
            <button type="button" class="btnMini" id="btnCalibCatNext">Weiter →</button>
          </div>
          <span class="calib-zoomHudLabel">Zoom</span>
          <input type="range" id="calibObsZoomSlider" min="50" max="400" step="1" value="100" />
          <span id="calibZoomReadout" class="calib-zoomHudReadout">100 %</span>
        </div>
      </div>
      <div id="calibFallbackWrap" class="calib-fallbackWrap" hidden>
        <span id="calibFallbackHint">OBS-Vorschau fehlgeschlagen: Bild wählen oder erneut versuchen.</span>
        <div class="calib-fallbackRow">
          <input id="calibFile" type="file" accept="image/*" style="max-width: 100%" />
          <button type="button" class="btnMini" id="calibRetryObs">OBS erneut</button>
        </div>
      </div>
    </div>
    <p id="calibStatus" class="calib-statusBar" aria-live="polite"></p>
  </div>
  <script src="dartboard-layout.js"></script>
  <script src="obszoom-calib.js"></script>
</body>
</html>
